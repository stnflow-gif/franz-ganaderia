<!DOCTYPE html>
<html lang="es" data-theme="glass">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#100e0b">
  <title>Ganadería Dyck Manantial</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dyck Manantial">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css?v=25">
</head>
<body>

  <!-- ============ LOGIN ============ -->
  <div class="login" id="loginScreen">
    <div class="login-card">
      <img class="logo" src="assets/img/logo.jpg" alt="Dyck Manantial">
      <h2>Dyck Manantial</h2>
      <p class="sub">Sistema de Gestión Ganadera</p>
      <form id="loginForm" method="post" action="#" autocomplete="on">
        <div class="field"><label>Email</label><div class="control"><input type="email" id="logEmail" name="username" placeholder="franz@correo.com" autocomplete="username" autocapitalize="none" spellcheck="false"></div></div>
        <div class="field"><label>Contraseña</label><div class="control"><input type="password" id="logPass" name="password" placeholder="••••••••" autocomplete="current-password"></div></div>
        <button class="btn btn-primary" style="width:100%" id="btnLogin" type="submit">Entrar</button>
      </form>
      <p class="auth-toggle" id="authToggle">¿Primera vez? <b>Creá tu cuenta</b></p>
      <p class="note-soft" id="loginNote"></p>
      <div class="e2e"><span data-icon="lock" data-size="14"></span> Cifrado de extremo a extremo</div>
    </div>
  </div>

  <!-- ============ APP ============ -->
  <div class="shell hidden" id="shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="logo-box"><img src="assets/img/logo.jpg" alt="Dyck Manantial"></div>
      <nav class="nav" id="nav">
        <button class="on" data-go="dashboard"><span class="ic-box" data-icon="home"></span><span class="lbl">Dashboard<small>Resumen general</small></span></button>
        <button data-go="ganaderia"><span class="ic-box" data-icon="cow"></span><span class="lbl">Ganadería<small>Operación del campo</small></span></button>
        <button data-go="personales"><span class="ic-box" data-icon="arrowDown"></span><span class="lbl">Gastos personales<small>Tus salidas</small></span></button>
        <button data-go="ingresos"><span class="ic-box" data-icon="coins"></span><span class="lbl">Ingresos<small>Todo lo que entra</small></span></button>
        <button data-go="tareas"><span class="ic-box" data-icon="tasks"></span><span class="lbl">Tareas<small>Pendientes y recordatorios</small></span></button>
      </nav>
      <div class="foot">
        <button class="logout-btn" data-go="ajustes" id="btnSettings"><span data-icon="settings" data-size="16"></span> Ajustes</button>
        <div class="user-chip">
          <div class="av" id="userAv">F</div>
          <div><div class="nm" id="userName">Franz Dyck</div><div class="em" id="userEmail">modo local</div></div>
        </div>
        <button class="logout-btn" id="btnLogout"><span data-icon="logout" data-size="16"></span> Cerrar sesión</button>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <!-- Main -->
    <main class="main">
      <div class="topbar-mobile">
        <button class="ham" id="ham" aria-label="Menú"><span data-icon="menu" data-size="22"></span></button>
        <span class="ttl" id="mobileTitle">Dashboard</span>
        <img src="assets/img/logo.jpg" alt="">
      </div>

      <!-- Cada sección se renderiza desde app.js -->
      <section class="screen on" id="screen-dashboard"></section>
      <section class="screen" id="screen-ganaderia"></section>
      <section class="screen" id="screen-personales"></section>
      <section class="screen" id="screen-ingresos"></section>
      <section class="screen" id="screen-tareas"></section>
      <section class="screen" id="screen-ajustes"></section>
    </main>
  </div>

  <!-- Botón flotante: gasto rápido (fuera del shell para no recortarse con el marco glass) -->
  <button class="fab hidden" id="fabQuick" title="Gasto rápido">
    <span data-icon="plus" data-size="26"></span>
  </button>

  <!-- Modal genérico -->
  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modal">
      <div class="modal-head"><h3 id="modalTitle">Título</h3>
        <button class="iconbtn" id="modalClose"><span data-icon="close" data-size="18"></span></button></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <!-- Tour onboarding -->
  <div class="tour-bg" id="tourBg"></div>
  <div class="tour-spot hidden" id="tourSpot"></div>
  <div class="tour-pop hidden" id="tourPop"></div>

  <div id="toast"></div>

  <script src="assets/js/config.js?v=27"></script>
  <script src="assets/js/icons.js?v=27"></script>
  <script src="assets/js/store.js?v=27"></script>
  <script src="assets/js/app.js?v=27"></script>
  <script src="assets/js/sync.js?v=27"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
