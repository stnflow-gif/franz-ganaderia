<!DOCTYPE html>
<html lang="es" data-theme="oro-claro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#121110">
  <title>Ganadería Dyck Manantial</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

  <!-- ============ LOGIN ============ -->
  <div class="login" id="loginScreen">
    <div class="login-card">
      <img class="logo" src="assets/img/logo.jpg" alt="Dyck Manantial">
      <h2>Dyck Manantial</h2>
      <p class="sub">Sistema de Gestión Ganadera</p>
      <button class="btn-google" id="btnGoogle"><span data-icon="google" data-size="20"></span> Iniciar Sesión con Google</button>
      <div class="divider">o con tu correo</div>
      <div class="field"><label>Email</label><div class="control"><input type="email" id="logEmail" placeholder="franz@correo.com"></div></div>
      <div class="field"><label>Contraseña</label><div class="control"><input type="password" id="logPass" placeholder="••••••••"></div></div>
      <button class="btn btn-primary" style="width:100%" id="btnLogin">Entrar</button>
      <p class="note-soft" id="loginNote">Conexión a Supabase pendiente — por ahora entrás en modo local.</p>
    </div>
  </div>

  <!-- ============ APP ============ -->
  <div class="shell hidden" id="shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="logo-box"><img src="assets/img/logo.jpg" alt="Dyck Manantial"></div>
      <nav class="nav" id="nav">
        <button class="on" data-go="dashboard"><span class="ic-box" data-icon="home"></span><span class="lbl">Dashboard<small>Resumen general</small></span></button>
        <button data-go="compras"><span class="ic-box" data-icon="cart"></span><span class="lbl">Compras<small>Compra de ganado</small></span></button>
        <button data-go="ventas"><span class="ic-box" data-icon="trending"></span><span class="lbl">Ventas<small>Venta de ganado</small></span></button>
        <button data-go="gastos"><span class="ic-box" data-icon="arrowDown"></span><span class="lbl">Gastos<small>Egresos</small></span></button>
        <button data-go="ingresos"><span class="ic-box" data-icon="coins"></span><span class="lbl">Ingresos<small>Entradas</small></span></button>
        <button data-go="salidas"><span class="ic-box" data-icon="receipt"></span><span class="lbl">Salidas<small>Cuentas por pagar</small></span></button>
        <button data-go="empleados"><span class="ic-box" data-icon="workers"></span><span class="lbl">Empleados<small>Vaqueros</small></span></button>
        <button data-go="bancos"><span class="ic-box" data-icon="bank"></span><span class="lbl">Bancos<small>Cuentas</small></span></button>
        <button data-go="ajustes"><span class="ic-box" data-icon="settings"></span><span class="lbl">Ajustes<small>Tema y datos</small></span></button>
      </nav>
      <div class="foot">
        <div class="user-chip">
          <div class="av" id="userAv">F</div>
          <div><div class="nm" id="userName">Franz Dyck</div><div class="em" id="userEmail">modo local</div></div>
        </div>
        <button class="logout-btn" id="btnLogout"><span data-icon="logout" data-size="16"></span> Cerrar sesión</button>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <!-- Main -->
    <main class="main">
      <div class="topbar-mobile">
        <button class="ham" id="ham" aria-label="Menú"><span data-icon="menu" data-size="22"></span></button>
        <span class="ttl" id="mobileTitle">Dashboard</span>
        <img src="assets/img/logo.jpg" alt="">
      </div>

      <!-- Cada sección se renderiza desde app.js -->
      <section class="screen on" id="screen-dashboard"></section>
      <section class="screen" id="screen-compras"></section>
      <section class="screen" id="screen-ventas"></section>
      <section class="screen" id="screen-gastos"></section>
      <section class="screen" id="screen-ingresos"></section>
      <section class="screen" id="screen-salidas"></section>
      <section class="screen" id="screen-empleados"></section>
      <section class="screen" id="screen-bancos"></section>
      <section class="screen" id="screen-ajustes"></section>
    </main>
  </div>

  <!-- Modal genérico -->
  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modal">
      <div class="modal-head"><h3 id="modalTitle">Título</h3>
        <button class="iconbtn" id="modalClose"><span data-icon="close" data-size="18"></span></button></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <!-- Tour onboarding -->
  <div class="tour-bg" id="tourBg"></div>
  <div class="tour-spot hidden" id="tourSpot"></div>
  <div class="tour-pop hidden" id="tourPop"></div>

  <div id="toast"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/sync.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
